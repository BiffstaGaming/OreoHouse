name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  # actions: write so this workflow can dispatch the downstream
  # build-server-image and build-windows-app workflows after a release.
  # GITHUB_TOKEN cannot trigger workflows via normal push events for
  # safety, but workflow_dispatch is exempt.
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Trigger downstream builds
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.release.outputs.tag_name }}
        # gh workflow run needs to know which repo to target. Without a
        # checkout step it can't infer one from git, so we pass --repo
        # explicitly. (Cheaper than a full actions/checkout for two API
        # calls.)
        run: |
          gh workflow run build-server-image.yml --repo "$REPO" --ref "$TAG"
          gh workflow run build-windows-app.yml  --repo "$REPO" --ref "$TAG"
