name: build-windows-app

on:
  push:
    tags:
      - 'v*'
      - 'phase-*'
  workflow_dispatch:

permissions:
  contents: write  # tauri-action needs this to create releases

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri -> target

      - name: Install frontend deps
        run: npm ci
        working-directory: client

      # Tag pushes (or workflow_dispatch against a tag ref): build and
      # publish a GitHub Release with the MSI + NSIS installers attached.
      - name: Build + release (tag refs)
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: client
          tagName: ${{ github.ref_name }}
          releaseName: "OreoHouse ${{ github.ref_name }}"
          releaseBody: |
            ## Server image

            `ghcr.io/biffstagaming/oreohouse:${{ github.ref_name }}` — see [Packages](https://github.com/BiffstaGaming/OreoHouse/pkgs/container/oreohouse).

            ## Client (Windows)

            Pick either the `.msi` or the NSIS `.exe` from the assets below. They aren't code-signed, so Windows SmartScreen will warn on first run — click **More info → Run anyway**, or right-click the file → Properties → Unblock.
          releaseDraft: false
          prerelease: false

      # workflow_dispatch from a branch ref (no tag): just build, upload as
      # a workflow artifact for download from the run page.
      - name: Build (non-tag, artifact only)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: client

      - name: Upload installers as artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: oreohouse-windows-installers
          path: |
            client/src-tauri/target/release/bundle/msi/*.msi
            client/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
